<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Java Grundlagen</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f766e'/%3E%3Ctext x='16' y='22' font-family='Arial' font-size='18' font-weight='700' text-anchor='middle' fill='white'%3EJ%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Lernmodule">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">J</div>
          <div>
            <h1>Java Grundlagen</h1>
          </div>
        </div>

        <nav id="moduleNav" class="module-nav"></nav>
      </aside>

      <main class="content">
        <header class="topbar">
          <h2 id="moduleTitle">Modul</h2>
          <div class="topbar-actions">
            <button id="glossaryButton" class="secondary-button" type="button">Glossar</button>
          </div>
        </header>

        <section class="module-layout">
          <article class="lesson-column">
            <section id="conceptSection" class="section-block">
              <h3 id="conceptHeading">Konzept</h3>
              <div id="conceptContent"></div>
            </section>

            <section id="examplesSection" class="section-block">
              <h3>Beispiele</h3>
              <div id="examplesContent"></div>
            </section>
          </article>

          <aside class="activity-column">
            <section id="quizSection" class="activity-card">
              <div class="activity-heading">
                <h3>Wissensquiz</h3>
              </div>
              <div id="quizContent"></div>
            </section>

            <section id="codeSection" class="activity-card">
              <div class="activity-heading">
                <h3>Code-Vervollständigung</h3>
              </div>
              <div id="codeContent"></div>
            </section>
          </aside>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
